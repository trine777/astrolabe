services:
  astrolabe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrolabe
    restart: unless-stopped

    environment:
      - XINGTU_DB_PATH=/data
      - XINGTU_LOG_LEVEL=INFO
      - XINGTU_EMBEDDING_PROVIDER=${XINGTU_EMBEDDING_PROVIDER:-none}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

    volumes:
      - ./data:/data

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.insert(0,'/app/src'); from xingtu.store import XingkongzuoStore; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
