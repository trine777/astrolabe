id: room-nous_spec
title: Nous Spec (规范)
kind: room
parent: area-nous
room_key: nous_spec
room_version: 1
accepted_task_types: [spec_write, spec_review, param_define]
summary: 认知框架的"规范"层。技术规格 + 参数空间定义。
source: human
synced_at: 2026-04-21
verified_at: 2026-04-21
verified_by: claude
stale_days: 14
tags: [nous, spec]

operations:
  - id: op-dispatch-spec
    kind: operation
    title: 派发 Spec 任务
    parent: room-nous_spec
    verified_at: 2026-04-21
    verified_by: claude
    references: [op-query-task]
    docs:
      - type: curl
        title: Spec 3 阶段任务
        language: bash
        content: |
          curl -s -X POST "$MATRIX_URL/api/admin/create-task" \
            -H "Authorization: Bearer $MATRIX_TOKEN" \
            -H "X-Caller-ID: trine" \
            -H "Content-Type: application/json" \
            -d "{
              \"task_id\": \"task-spec-$(date +%s)\",
              \"task_type\": \"spec_write\",
              \"requester_id\": \"trine\",
              \"idempotency_key\": \"spec-xxx\",
              \"requested_room_key\": \"nous_spec\",
              \"input_payload\": {\"spec_name\":\"...\",\"scope\":\"...\"}
            }"
          # 下一步: op-query-task 查状态
      - type: rule
        title: 3 阶段含义与依赖
        content: |
          spec_write   — 写初版技术规格 (what, scope, constraints)
                          产物: spec_draft.md
          spec_review  — 规格 peer review (可讨论 room 并行)
                          产物: spec_reviewed.md + 评审意见
          param_define — 参数空间收敛 (default / min / max / enum)
                          产物: params.yaml

          write → review 严格串行, review 通过才能 param_define.
          review 不过会回退 spec_write.
