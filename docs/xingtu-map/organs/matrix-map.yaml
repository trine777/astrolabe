id: organ-xingtu-matrix-map
title: Matrix 操作地图
kind: organ
parent: area-xingtu-matrix-bridge
summary: 星图承载的 Matrix 地图子系统 — 给 agent 一个"Matrix 怎么用"的机读导航. 零新表, 复用 Collection + Document + Relation.
source: human
verified_at: 2026-04-22
verified_by: claude
stale_days: 30
module_path: src/xingtu/matrix_map.py
tags: [xingtu, matrix-map]

operations:
  - id: op-xingtu-map-overview
    kind: operation
    title: Matrix 地图概览
    parent: organ-xingtu-matrix-map
    verified_at: 2026-04-22
    verified_by: claude
    docs:
      - type: curl
        title: 顶层入口 (agent 第一步)
        language: bash
        content: |
          xingtu_map_overview()
          # 返回: {area_count, room_count, organ_count, operation_count, areas: [...]}
          # 空库时带 hint, 教你先 python scripts/import_matrix_map.py
      - type: rule
        title: 后续四层导航
        content: |
          overview → enter_area(id) → get_room(id) → get_operation(id)
          op 里 1-3 个 docs 就是可粘贴的 curl / rule / diagram.

  - id: op-xingtu-map-find
    kind: operation
    title: 关键词搜索地图
    parent: organ-xingtu-matrix-map
    verified_at: 2026-04-22
    verified_by: claude
    docs:
      - type: curl
        title: 找 op / room / area
        language: bash
        content: |
          xingtu_map_find(query="discussion", limit=10)
          # 全层搜 (area/room/organ/op + docs 正文)
          # snake_case 拆词: 'task_type' 能命中 'task'
          # 返回带 matched_in 标注命中维度
      - type: rule
        title: "进阶: 图查询"
        content: |
          xingtu_map_graph(node_id, max_hops=1, relation_types=["contains","references"])
          # 顺关系图发现跨 area 依赖. 比如 op-dispatch-ppt --[references]--> op-query-task

  - id: op-xingtu-map-register
    kind: operation
    title: 注册地图节点 (REST)
    parent: organ-xingtu-matrix-map
    verified_at: 2026-04-22
    verified_by: claude
    docs:
      - type: curl
        title: 从 yaml 批量注册
        language: bash
        content: |
          # 直连 (默认, 本进程内注册)
          python3 scripts/import_matrix_map.py

          # HTTP API
          python3 scripts/import_matrix_map.py --via-http http://localhost:8000 --tenant default
      - type: rule
        title: 注册入口清单
        content: |
          POST /api/v1/matrix-map/areas         单个注册 area
          POST /api/v1/matrix-map/rooms         单个注册 room (含 room_key 校验)
          POST /api/v1/matrix-map/operations    单个注册 op (1-3 docs 硬约束)
          POST /api/v1/matrix-map/bulk-register 一次全量
